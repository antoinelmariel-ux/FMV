<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FMV Planner Local</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar glass">
        <div>
          <h1>FMV Planner</h1>
          <p>Recommandations d'heures par projet, étape et participant</p>
        </div>
        <div class="tabs" role="tablist" aria-label="Navigation principale">
          <button class="tab active" data-tab="userSpace">Espace utilisateur</button>
          <button class="tab" data-tab="adminSpace">Back-office</button>
        </div>
      </header>

      <main>
        <section id="userSpace" class="panel active">
          <div class="card">
            <h2>Sélection du projet</h2>
            <div class="row">
              <label for="projectSelect">Type de projet</label>
              <select id="projectSelect"></select>
            </div>
          </div>

          <div class="card">
            <h2>Questionnaire dynamique</h2>
            <form id="questionnaireForm" class="questionnaire"></form>
            <button id="calculateBtn" class="btn primary">Calculer la recommandation</button>
          </div>

          <div class="card" id="reportCard">
            <div class="row between align-center">
              <h2>Recommandation détaillée</h2>
              <button id="exportPdfBtn" class="btn">Exporter PDF</button>
            </div>
            <div id="reportOutput" class="report-empty">Aucune recommandation calculée.</div>
          </div>
        </section>

        <section id="adminSpace" class="panel">
          <div class="card admin-toolbar">
            <div class="row wrap">
              <button id="addProjectBtn" class="btn primary">+ Nouveau type de projet</button>
              <button id="resetBtn" class="btn danger">Réinitialiser</button>
              <button id="exportJsonBtn" class="btn">Exporter JSON</button>
              <label class="btn file-input">
                Importer JSON
                <input type="file" id="importJsonInput" accept="application/json" />
              </label>
            </div>
          </div>

          <div id="adminProjectsOverview" class="projects-overview"></div>
        </section>
      </main>

      <footer>
        <span></span>
        <span id="versionBadge">Version v1.13.0</span>
      </footer>
    </div>

    <template id="projectBlockTemplate">
      <article class="card project-block">
        <div class="wizard-header">
          <h3>Parcours de configuration</h3>
          <div class="wizard-steps" role="tablist" aria-label="Étapes de configuration"></div>
        </div>

        <section class="wizard-section" data-step="0" data-title="Projet">
          <div class="row between align-center wrap">
            <input class="project-name" placeholder="Nom du projet" />
          </div>
          <textarea class="project-description" rows="2" placeholder="Description"></textarea>
        </section>

        <section class="wizard-section" data-step="1" data-title="Structure">
          <div class="lego-grid">
            <div>
              <h3>Étapes</h3>
              <div class="stages-list"></div>
              <button class="btn small add-stage">+ Étape</button>
            </div>
            <div>
              <h3>Participants</h3>
              <div class="participants-list"></div>
              <button class="btn small add-participant">+ Participant</button>
            </div>
            <div>
              <h3>Questions</h3>
              <div class="questions-list"></div>
              <button class="btn small add-question">+ Question</button>
            </div>
          </div>
        </section>

        <section class="wizard-section" data-step="2" data-title="Règles">
          <h3>Règles horaires (base + conditionnelles)</h3>
          <div class="rules-table-wrapper">
            <table class="rules-table">
              <thead></thead>
              <tbody></tbody>
            </table>
          </div>
        </section>
        <section class="wizard-section modifiers-anchor" data-step="3" data-title="Modificateurs"></section>
        <section class="wizard-section project-summary" data-step="4" data-title="Résumé"></section>
        <div class="wizard-footer">
          <button class="btn wizard-prev">← Étape précédente</button>
          <button class="btn primary wizard-next">Étape suivante →</button>
        </div>
      </article>
    </template>

    <div id="projectEditorModal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close-modal></div>
      <div class="modal-content card">
        <div class="row between align-center">
          <h2>Édition du projet</h2>
          <button id="closeProjectEditorBtn" class="btn">Fermer</button>
        </div>
        <div id="adminProjects"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
